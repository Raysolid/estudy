server:
  port: 8090
  servlet:
    context-path: /api
spring:
  application:
    name: estudy-web
  datasource:
    url: jdbc:mysql://localhost:3306/estudy?allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2B8&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  task:
    scheduling:
      pool:
        size: 3
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mvc:
    async:
      request-timeout: 300000
  web:
    async:
      request-timeout: 300000
  server:
    tomcat:
      connection-timeout: 300000
      keep-alive-timeout: 300000
  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    protocol: smtps
mybatis:
  configuration:
    map-underscore-to-camel-case: true
project:
  folder: ${PROJECT_FOLDER:}
  log:
    root:
    level: debug
coze:
  api:
    upload-url: ${COZE_UPLOAD_URL:https://api.coze.cn/v1/files/upload}
    workflow-url: ${COZE_WORKFLOW_URL:https://api.coze.cn/v1/workflow/run}
