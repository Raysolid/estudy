server:
  port: 8091
  servlet:
    context-path: /api
spring:
  application:
    name: estudy-admin
  datasource:
    url: jdbc:mysql://localhost:3306/estudy?allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2B8&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  task:
    scheduling:
      pool:
        size: 3
  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    protocol: smtps
mybatis:
  configuration:
    map-underscore-to-camel-case: true
project:
  folder: ${PROJECT_FOLDER:}
  log:
    root:
    level: debug
admin:
  account: ${ADMIN_ACCOUNT:admin}
  password: ${ADMIN_PASSWORD:}